<!DOCTYPE html>
<html>
<head>
  <style>
    body { font-family: 'Segoe UI', Helvetica, Arial, sans-serif; line-height: 1.6; color: #334155; margin: 0; padding: 20px; background-color: #f8fafc; }
    .container { max-width: 600px; margin: 0 auto; background: #ffffff; border: 1px solid #e2e8f0; border-radius: 8px; overflow: hidden; box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1); }
    .header { background-color: #16a34a; padding: 24px; border-bottom: 1px solid #e2e8f0; color: #ffffff; }
    .header h2 { margin: 0; font-size: 20px; }
    .content { padding: 24px; }
    .details-table { width: 100%; border-collapse: collapse; margin-bottom: 24px; }
    .details-table td { padding: 8px 0; border-bottom: 1px solid #f1f5f9; }
    .label { font-weight: 600; color: #64748b; width: 35%; }
    .value { color: #1e293b; }
    .footer { padding: 16px 24px; background-color: #f8fafc; font-size: 12px; color: #94a3b8; text-align: center; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h2>Leave Request Approved</h2>
    </div>
    <div class="content">
      <p>Hello,</p>
      <p>Good news – your leave request has been approved.</p>

      <table class="details-table">
        <tr>
          <td class="label">Leave Type</td>
          <td class="value"><strong>{{ leave_type }}</strong></td>
        </tr>
        <tr>
          <td class="label">Period</td>
          <td class="value">{{ start_date }} — {{ end_date }}</td>
        </tr>
      </table>
    </div>
    <div class="footer">
      This is an automated notification from your HR Management System.
    </div>
  </div>
</body>
</html>
