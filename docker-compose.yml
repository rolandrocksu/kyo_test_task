version: "3.9"

services:
  mailhog:
    image: mailhog/mailhog
    container_name: leave-demo-mailhog
    ports:
      - "1025:1025" # SMTP
      - "8025:8025" # Web UI

  postgres:
    image: postgres:16
    container_name: leave-demo-postgres
    environment:
      - POSTGRES_DB=leave_demo
      - POSTGRES_USER=leave_demo
      - POSTGRES_PASSWORD=leave_demo
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  app:
    build: .
    container_name: leave-demo-app
    depends_on:
      - mailhog
      - postgres
    env_file:
      - .env
    ports:
      - "3000:3000"
    volumes:
      - .:/app

volumes:
  pgdata:

